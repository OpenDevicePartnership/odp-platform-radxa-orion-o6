# Builds the ODP debug bootchain for the Radxa Orion O6 platform inside this repository's devcontainer image.
#
# Triggers:
#   - pull_request:    CI validation (artifact uploaded, 1-day retention).
#   - workflow_dispatch: manual build from any branch (artifact uploaded, 1-day retention).
#   - workflow_call:   invoked by the release workflow with a specific git ref.
#
# SPDX-License-Identifier: MIT
#

name: bootchain-debug-build

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '.devcontainer/**'
      - 'postbuild/os/**'
      - '.github/workflows/container_build.yml'
      - '.github/workflows/os_build.yml'
      - '.github/workflows/publish_release_image.yml'
      - '**/*.md'
  workflow_dispatch:
  workflow_call:
    inputs:
      git_ref:
        description: 'Git tag or SHA to check out'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Orion O6 debug bootchain
    container:
      # TODO: rogurr namespace. Revert to opendevicepartnership before merging to upstream.
      image: ghcr.io/rogurr/odp-platform-radxa-orion-o6/devcontainer:latest
      options: --user root
    defaults:
      run:
        shell: bash
    steps:
      - name: Clone Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref || '' }}
          submodules: recursive

      - name: Build Debug Firmware
        run: make all TARGET=debug

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bootchain-debug
          path: build/postbuild/bootchain/**
          retention-days: 1
          if-no-files-found: error
