# Builds the DevContainer image for this repository and publishes it to the GitHub Container Registry (GHCR).
#
# This workflow is manual-only. The user must create the git tag before triggering.
# Access is gated by the "release" GitHub Environment — only repo managers can approve execution.
# The git tag is used as the version tag on the container image.
#
# SPDX-License-Identifier: MIT
#

name: container-publish

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git tag to build from (must already exist, used as the image version tag)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  # TODO: rogurr namespace. Revert to opendevicepartnership before merging to upstream.
  CONTAINER_IMAGE: "ghcr.io/rogurr/odp-platform-radxa-orion-o6/devcontainer"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    name: Build and publish devcontainer image
    steps:
      - name: Clone Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref }}

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login "ghcr.io" -u "${{ github.actor }}" --password-stdin

      - name: Build container image
        run: |
          docker build \
            -f .devcontainer/Dockerfile \
            -t "${CONTAINER_IMAGE}:latest" \
            -t "${CONTAINER_IMAGE}:${{ inputs.git_ref }}" \
            -t "${CONTAINER_IMAGE}:${{ github.sha }}" \
            .

      - name: Push container image
        run: |
          docker push "${CONTAINER_IMAGE}:latest"
          docker push "${CONTAINER_IMAGE}:${{ inputs.git_ref }}"
          docker push "${CONTAINER_IMAGE}:${{ github.sha }}"
