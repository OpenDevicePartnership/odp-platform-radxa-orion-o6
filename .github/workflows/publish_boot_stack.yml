# Builds all platform deliverables and publishes them as a GitHub Release.
#
# SPDX-License-Identifier: MIT
#
# Manually triggered only and gated by the "release" GitHub Environment to restrict access to repo managers.
# The workflow must be dispatched from a Git tag in the form vYYYY.MM.DD selected via the "Use workflow from"
# dropdown in the Actions UI.  The resulting release will contain all the built artifacts in a versioned zip file.
#
# Third-party actions are pinned by commit SHA which is monitored by the dependabot.yml file.
#

name: publish_boot_stack

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:

  # 1) Validate that this run was dispatched from a properly-formatted release tag
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Validate dispatch ref
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ "$REF_TYPE" != "tag" ]]; then
            echo "::error::This workflow must be dispatched from a Git tag (got ref_type='$REF_TYPE', ref_name='$REF_NAME').  Use the 'Use workflow from' dropdown in the Actions UI to select a vYYYY.MM.DD tag." >&2
            exit 1
          fi
          if [[ ! "$REF_NAME" =~ ^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}$ ]]; then
            echo "::error::Dispatch tag '$REF_NAME' must match vYYYY.MM.DD (e.g. v2026.05.27)." >&2
            exit 1
          fi
          if gh release view "$REF_NAME" >/dev/null 2>&1; then
            echo "::error::A GitHub Release for tag '$REF_NAME' already exists.  Releases are immutable; delete the existing release manually if you intend to republish." >&2
            exit 1
          fi

  # 2a) Build the debug bootchain
  build-debug:
    needs: validate
    uses: ./.github/workflows/build_bootchain.yml
    with:
      git_ref: ${{ github.ref_name }}
      build_target: debug

  # 2b) Build the release bootchain
  build-release:
    needs: validate
    uses: ./.github/workflows/build_bootchain.yml
    with:
      git_ref: ${{ github.ref_name }}
      build_target: release

  # 2c) Build the OS image
  build-os:
    needs: validate
    uses: ./.github/workflows/build_os_image.yml
    with:
      git_ref: ${{ github.ref_name }}

  # 3) Collect artifacts and publish GitHub Release
  publish:
    runs-on: ubuntu-latest
    environment: release
    needs: [validate, build-debug, build-release, build-os]
    timeout-minutes: 30
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          path: odp-orion-o6-${{ github.ref_name }}
          merge-multiple: true

      - name: Create release bundle zip
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ls -la "odp-orion-o6-${RELEASE_TAG}"
          zip -r "odp-orion-o6-${RELEASE_TAG}.zip" "odp-orion-o6-${RELEASE_TAG}" >/dev/null

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: odp-orion-o6-${{ github.ref_name }}.zip
